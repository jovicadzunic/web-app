<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic page setup -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beginner Web App</title>
  <!-- Link to our CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-nav">
    <div class="nav-content">
      <span class="brand-name">Beginner Web App</span>
    </div>
  </header>

  <!-- Main container for todo app -->
  <main class="container">
    <p class="section-label">TASK ORGANIZER</p>
    <!-- App title -->
    <h1>My Todo List</h1>

    <!-- Small helper text -->
    <p class="subtitle">Add your tasks and keep track of your day.</p>

    <!-- Input row for adding new tasks -->
    <div class="input-row">
      <input id="taskInput" type="text" placeholder="Enter a new task" />
      <button id="addTaskBtn">Add Task</button>
    </div>

    <!-- Task list will be shown here -->
    <ul id="taskList"></ul>
  </main>

  <!-- Link to our JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
